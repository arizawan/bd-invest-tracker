name: Fetch & Deploy

on:
  schedule:
    # Run daily at 3:30 PM BST (09:30 UTC) — after DSE market close
    - cron: '30 9 * * 1-5'  # Mon-Fri (market days)
    - cron: '30 9 * * 6'    # Saturday refresh
  workflow_dispatch:         # Manual trigger
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/**'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch all data
        run: node scripts/fetch-all.js
        continue-on-error: true

      - name: Copy data to docs for GitHub Pages
        run: |
          mkdir -p docs/data
          cp -v data/*.json docs/data/

      - name: Fix data path in app.js for Pages
        run: |
          sed -i "s|'../data/'|'./data/'|g" docs/app.js

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ docs/data/ docs/app.js
          git commit -m "chore: update investment data $(date +%Y-%m-%d)"
          git push

      - name: Summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "Date: $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "Changes: ${{ steps.check.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "Files in docs/data/:" >> $GITHUB_STEP_SUMMARY
          ls -la docs/data/ >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(none)" >> $GITHUB_STEP_SUMMARY
